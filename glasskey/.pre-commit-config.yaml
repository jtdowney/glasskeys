repos:
  - repo: https://github.com/jtdowney/pre-commit-gleam
    rev: v1.0.0
    hooks:
      - id: check
      - id: format
  - repo: local
    hooks:
      - id: prettier
        name: prettier --check
        entry: bun run format
        language: system
        files: ^src/.*\.*$
        pass_filenames: false
      - id: eslint
        name: eslint
        entry: bun run lint
        language: system
        files: ^src/.*\.mjs$
        pass_filenames: false
