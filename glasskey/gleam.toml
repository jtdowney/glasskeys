name = "glasskey"
version = "1.0.0"
target = "javascript"
description = "Browser bindings for WebAuthn/FIDO2 credential ceremonies"
licences = ["Apache-2.0"]
repository = { type = "github", user = "jtdowney", repo = "glasskey", path = "glasskey" }
gleam = ">= 1.15.2"
links = [
  { title = "glasslock (server verification)", href = "https://hexdocs.pm/glasslock" },
]

[dependencies]
gleam_javascript = ">= 1.0.0 and < 2.0.0"
gleam_json = ">= 3.1.0 and < 4.0.0"
gleam_stdlib = ">= 0.67.1 and < 2.0.0"

[dev-dependencies]
birdie = ">= 1.6.0 and < 2.0.0"
qcheck = ">= 1.0.4 and < 2.0.0"
unitest = ">= 1.0.0 and < 2.0.0"
