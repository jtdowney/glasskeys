name: test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check-format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.16"
          rebar3-version: "3"
      - name: glasslock
        working-directory: glasslock
        run: gleam format --check src test
      - name: glasskey
        working-directory: glasskey
        run: gleam format --check src test

  glasslock-erlang:
    name: glasslock (OTP ${{ matrix.otp }} / Gleam ${{ matrix.gleam }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: glasslock
    strategy:
      fail-fast: false
      matrix:
        otp: ["27", "28"]
        gleam: ["1.15", "1.16"]
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          gleam-version: ${{ matrix.gleam }}
          rebar3-version: "3"
      - run: gleam deps download
      - run: gleam test --target erlang

  glasslock-javascript:
    name: glasslock (Node ${{ matrix.node }} / Gleam ${{ matrix.gleam }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: glasslock
    strategy:
      fail-fast: false
      matrix:
        node: ["22", "24"]
        gleam: ["1.15", "1.16"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: ${{ matrix.gleam }}
          rebar3-version: "3"
      - run: gleam deps download
      - run: gleam test --target javascript

  glasskey:
    name: glasskey (Gleam ${{ matrix.gleam }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: glasskey
    strategy:
      fail-fast: false
      matrix:
        gleam: ["1.15", "1.16"]
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: ${{ matrix.gleam }}
          rebar3-version: "3"
      - uses: oven-sh/setup-bun@v2
      - run: gleam deps download
      - run: gleam test
      - run: bun install --frozen-lockfile
      - run: bun run format:check

  example-backend:
    name: example/backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: example/backend
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.16"
          rebar3-version: "3"
      - run: gleam deps download
      - run: gleam build
      - run: gleam format --check src

  example-frontend-lustre:
    name: example/frontends/lustre
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: example/frontends/lustre
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.16"
          rebar3-version: "3"
      - run: gleam deps download
      - run: gleam build
      - run: gleam format --check src

  example-frontend-svelte:
    name: example/frontends/svelte
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: example/frontends/svelte
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run format:check
      - run: bun run build
