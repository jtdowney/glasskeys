repos:
  - repo: local
    hooks:
      - id: prettier
        name: prettier --check
        entry: bun run format:check
        language: system
        files: ^src/.*\.*$
        pass_filenames: false
      - id: eslint
        name: eslint
        entry: bun run lint
        language: system
        files: ^src/.*\.mjs$
        pass_filenames: false
