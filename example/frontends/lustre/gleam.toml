name = "frontend"
version = "0.1.0"
target = "javascript"
gleam = ">= 1.15.2"

[dependencies]
glasskey = { path = "../../../glasskey" }
gleam_http = ">= 4.3.0 and < 5.0.0"
gleam_javascript = ">= 1.0.0 and < 2.0.0"
gleam_json = ">= 3.1.0 and < 4.0.0"
gleam_stdlib = ">= 1.0.0 and < 2.0.0"
lustre = ">= 5.0.0 and < 6.0.0"
modem = ">= 2.1.2 and < 3.0.0"
rsvp = ">= 1.0.0 and < 2.0.0"

[dev-dependencies]
lustre_dev_tools = ">= 2.0.0 and < 3.0.0"

[tools.lustre.dev]
host = "0.0.0.0"
proxy = { from = "/api", to = "http://localhost:3000/api" }

[[tools.lustre.html.stylesheets]]
href = "/app.css"
